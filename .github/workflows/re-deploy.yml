---
name: Reusable Deploy

on:
    workflow_call:
        inputs:
            ref:
                description: Git reference to build and deploy
                required: true
                type: string
            before_sha:
                description: Previous commit SHA for syndication diff
                required: false
                default: ""
                type: string
            current_sha:
                description: Current commit SHA for syndication diff
                required: false
                default: ""
                type: string
            run_syndicate:
                description: Whether to run post-deploy syndication
                required: false
                default: false
                type: boolean

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.ref }}

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: ".ruby-version"
                  bundler-cache: true

            - name: Build Jekyll site
              env:
                  JEKYLL_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PAGES_REPO_NWO: ${{ vars.PAGES_REPO_NWO }}
              run: |
                  printf 'webmentions:\n  pause_lookups: true\n' > /tmp/deploy_config.yml
                  bundle exec jekyll build --trace --config _config.yml,/tmp/deploy_config.yml

            - name: Copy markdown source files
              run: |
                  bash .github/scripts/copy-markdown-sources.sh

            - name: Upload artifact
              shell: sh
              run: |
                  tar \
                    --dereference --hard-dereference \
                    --directory "_site" \
                    -cvf "$RUNNER_TEMP/artifact.tar" \
                    --exclude=.git \
                    --exclude=.github \
                    .
            - name: Upload pages artifact
              uses: actions/upload-artifact@v7
              with:
                  name: github-pages
                  path: ${{ runner.temp }}/artifact.tar
                  retention-days: 1
                  if-no-files-found: error

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    syndicate:
        needs: deploy
        if: inputs.run_syndicate && inputs.before_sha != '' && inputs.current_sha != ''
        permissions:
            contents: read
        uses: ./.github/workflows/re-syndicate.yml
        with:
            before_sha: ${{ inputs.before_sha }}
            current_sha: ${{ inputs.current_sha }}

    purge-cache:
        needs: deploy
        runs-on: ubuntu-latest
        steps:
            - name: Purge Cloudflare cache
              uses: jakejarvis/cloudflare-purge-action@master
              env:
                  CLOUDFLARE_ZONE: ${{ secrets.CLOUDFLARE_ZONE_ID }}
                  CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_CACHE_TOKEN }}
