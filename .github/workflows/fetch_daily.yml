---
name: Fetch Daily
on:
    workflow_dispatch:
    schedule:
        - cron: "11 5 * * *"

concurrency:
    group: fetch-daily
    cancel-in-progress: false

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    fetch:
        runs-on: ubuntu-latest
        outputs:
            before_sha: ${{ steps.before.outputs.sha }}
            current_sha: ${{ steps.after.outputs.sha }}
        steps:
            - name: Check out Repo
              uses: actions/checkout@v6
              with:
                  token: ${{ secrets.PAT_TOKEN }}

            - name: Set up Python and dependencies
              uses: ./.github/actions/python-setup
              with:
                  python-version: 3.13.1

            - name: Capture before SHA
              id: before
              run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

            - name: Processing Python Scripts
              env:
                  OPEN_WEATHER_KEY: ${{ secrets.OPEN_WEATHER_KEY }}
                  OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}
              run: |-
                  python '_python/forecast.py'
                  python '_python/threat.py'
                  python '_python/task.py'
                  python '_python/doctrine.py'
                  python '_python/fixtures.py'
                  python '_python/stocks.py'
                  python '_python/news.py'
                  python '_python/word.py'
                  python '_python/quote.py'
                  python '_python/eno.py'
                  python '_python/remember_film.py'
                  python '_python/countdown.py'
                  python '_python/blogroll.py'
                  python '_python/jokes.py'
                  python '_python/daily.py'

            - name: Commit and push
              uses: ./.github/actions/git-commit-back
              with:
                  message: "Chore: New Daily Rundown Post [skip ci]"

            - name: Capture after SHA
              id: after
              run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    deploy:
        needs: fetch
        uses: ./.github/workflows/re-deploy.yml
        secrets: inherit
        with:
            ref: ${{ github.ref_name }}
            run_syndicate: true
            before_sha: ${{ needs.fetch.outputs.before_sha }}
            current_sha: ${{ needs.fetch.outputs.current_sha }}
        permissions:
            contents: read
            pages: write
            id-token: write
