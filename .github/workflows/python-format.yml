---
name: Python Format
on:
    pull_request:
        paths:
            - "_python/*"
    push:
        paths:
            - "_python/*"
    workflow_dispatch:
jobs:
    Format_and_testing:
        name: Run formatting
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Python Dependencies
              run: python -m pip install -r "requirements.txt" --quiet
              working-directory: ./_python

            - name: Format with yapf (pep8) and commit back
              run: |
                  python -m yapf --style pep8 --recursive -i .
                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A
                  git diff --staged --quiet || git commit -m "Chore: Python formatting $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
                  git push
              working-directory: ./_python

            - name: Run Unit Tests
              run: pytest --cov=.  --cov-report term-missing | tee $GITHUB_STEP_SUMMARY
              working-directory: ./_python
