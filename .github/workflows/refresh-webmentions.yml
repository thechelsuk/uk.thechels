name: Refresh Webmentions Cache
on:
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Refresh webmentions
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          PAGES_REPO_NWO: thechelsuk/uk.thechels

      - name: Commit updated webmention cache
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add .cache/
          git diff --staged --quiet || git commit -m "chore: Refresh webmention cache [skip ci]"
          git push
