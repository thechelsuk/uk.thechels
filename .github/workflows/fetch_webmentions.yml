---
name: Fetch Webmentions
on:
    schedule:
        - cron: "27 */3 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: fetch-webmentions
    cancel-in-progress: false

jobs:
    fetch:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: ".ruby-version"
                  bundler-cache: true

            - name: Fetch webmentions
              run: bundle exec jekyll build --trace
              env:
                  JEKYLL_ENV: production
                  PAGES_REPO_NWO: ${{ vars.PAGES_REPO_NWO }}

            - name: Commit updated webmention cache
              uses: ./.github/actions/git-commit-back
              with:
                  message: "Chore: Refresh webmention cache [skip ci]"

    deploy:
        needs: fetch
        uses: ./.github/workflows/re-deploy.yml
        secrets: inherit
        with:
            ref: ${{ github.ref_name }}
            run_syndicate: false
        permissions:
            contents: read
            pages: write
            id-token: write
