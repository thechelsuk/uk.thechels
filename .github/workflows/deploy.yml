---
name: Build Deploy Syndicate
on:
    workflow_dispatch:
    push:
        branches:
            - main
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: ".ruby-version"
                  bundler-cache: true

            - name: Build Jekyll site
              run: |
                  printf 'webmentions:\n  pause_lookups: true\n' > /tmp/deploy_config.yml
                  bundle exec jekyll build --config _config.yml,/tmp/deploy_config.yml

            - name: Copy markdown source files
              run: |
                  bash .github/scripts/copy-markdown-sources.sh

            - name: Upload artifact
              shell: sh
              run: |
                  tar \
                    --dereference --hard-dereference \
                    --directory "_site" \
                    -cvf "$RUNNER_TEMP/artifact.tar" \
                    --exclude=.git \
                    --exclude=.github \
                    .
            - name: Upload pages artifact
              uses: actions/upload-artifact@v7
              with:
                  name: github-pages
                  path: ${{ runner.temp }}/artifact.tar
                  retention-days: 1
                  if-no-files-found: error

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    syndicate:
        needs: deploy
        if: github.event_name == 'push'
        permissions:
            contents: read
        uses: ./.github/workflows/syndicate.yml
        with:
            before_sha: ${{ github.event.before }}
            current_sha: ${{ github.sha }}
