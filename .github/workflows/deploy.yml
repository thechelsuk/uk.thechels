---
name: Build Deploy Syndicate
on:
    workflow_dispatch:
    push:
        branches:
            - main
    schedule:
        - cron: "0 * * * *"

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: ruby/setup-ruby@v1
              with:
                  ruby-version: "3.4"
                  bundler-cache: true

            - name: Build Jekyll site
              run: |
                  printf 'webmentions:\n  pause_lookups: true\n' > /tmp/deploy_config.yml
                  bundle exec jekyll build --config _config.yml,/tmp/deploy_config.yml

            - name: Copy markdown source files
              run: |
                  bash .github/scripts/copy-markdown-sources.sh

            - name: Upload artifact
              shell: sh
              run: |
                  tar \
                    --dereference --hard-dereference \
                    --directory "_site" \
                    -cvf "$RUNNER_TEMP/artifact.tar" \
                    --exclude=.git \
                    --exclude=.github \
                    .
            - name: Upload pages artifact
              uses: actions/upload-artifact@v7
              with:
                  name: github-pages
                  path: ${{ runner.temp }}/artifact.tar
                  retention-days: 1
                  if-no-files-found: error

    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v5

    syndicate:
        runs-on: ubuntu-latest
        needs: deploy
        if: github.event_name == 'push'
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 2

            - name: Notify Bridgy Fed about new posts
              continue-on-error: true
              run: |
                  new_posts=$(git diff --name-status HEAD~1 HEAD -- _posts/ | awk '$1 == "A" { print $2 }')
                  if [ -z "$new_posts" ]; then
                    echo "No new posts detected, skipping publication."
                    exit 0
                  fi
                  for file in $new_posts; do
                    filename=$(basename "$file")
                    slug=$(echo "${filename%.md}" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')
                    source_url="https://thechels.uk/${slug}"
                    publish_to_fed=$(sed -n '/^---$/,/^---$/p' "$file" | grep '^publish_to_fed:' | head -n 1 | cut -d ':' -f 2- | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')
                    if [ "$publish_to_fed" != "true" ]; then
                      echo "Skipping: $source_url (publish_to_fed is not true)"
                      continue
                    fi
                    echo "Publishing: $source_url"
                    echo -n "  fediverse: "
                    curl -s -o /dev/null -w "%{http_code}" \
                      -d "source=${source_url}&target=https://fed.brid.gy/" \
                      https://fed.brid.gy/webmention
                    echo
                  done
