name: Fetch Feeds

on:
    schedule:
        - cron: "0 */2 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    fetch-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Install Python Dependencies
              run: python -m pip install -r "requirements.txt" --quiet
              working-directory: ./_python

            - name: Fetch PESOS feeds
              run: |
                  python fetch_videos.py
                  python fetch_releases.py
              working-directory: ./_python

            - name: Commit updated YAML files
              run: |
                  git config user.name "GitHub Action"
                  git config user.email "action@github.com"
                  git add -A
                  git diff --staged --quiet || git commit -m "Chore: update PESOS files $(date -u +%Y-%m-%dT%H:%M) [skip ci]"
                  git push
