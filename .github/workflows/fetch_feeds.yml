name: Fetch social posts

on:
    schedule:
        - cron: "0 */3 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

jobs:
    fetch-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Install Python deps
              run: pip install feedparser requests pyyaml

            - name: Fetch social posts
              run: python _python/local/local_fetch_social_posts.py

            - name: Commit updated YAML (if changed)
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add _data/bluesky.yml _data/mastodon.yml
                  git diff --staged --quiet || git commit -m "chore: update social data files"
                  git push
