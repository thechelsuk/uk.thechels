---
name: Fetch Feeds

on:
    schedule:
        - cron: "0 */2 * * *"
    workflow_dispatch:

permissions:
    contents: write
    pages: write
    id-token: write

concurrency:
    group: fetch-feeds
    cancel-in-progress: false

jobs:
    fetch:
        runs-on: ubuntu-latest
        outputs:
            before_sha: ${{ steps.before.outputs.sha }}
            current_sha: ${{ steps.after.outputs.sha }}

        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Set up Python and dependencies
              uses: ./.github/actions/python-setup
              with:
                  python-version: "3.12"

            - name: Capture before SHA
              id: before
              run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

            - name: Fetch PESOS feeds
              run: |
                  python fetch_videos.py
                  python fetch_releases.py
              working-directory: ./_python

            - name: Commit updated YAML files
              uses: ./.github/actions/git-commit-back
              with:
                  message: "Chore: update PESOS files [skip ci]"

            - name: Capture after SHA
              id: after
              run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    deploy:
        needs: fetch
        uses: ./.github/workflows/re-deploy.yml
        secrets: inherit
        with:
            ref: ${{ github.ref_name }}
            run_syndicate: true
            before_sha: ${{ needs.fetch.outputs.before_sha }}
            current_sha: ${{ needs.fetch.outputs.current_sha }}
        permissions:
            contents: read
            pages: write
            id-token: write
