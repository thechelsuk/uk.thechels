---
name: x - Link Checker

on:
    workflow_dispatch:
    schedule:
        - cron: "0 20 1 * *"

permissions:
    issues: write

jobs:
    linkChecker:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - name: Link Checker
              id: lychee
              uses: lycheeverse/lychee-action@v2.8.0
              with:
                  args: >-
                      --verbose
                      --no-progress
                      --base https://thechels.uk
                      --include 'https?://([a-z]+\.)?thechels\.uk'
                      --timeout=30
                      --max-retries=2
                      './**/*.md'
                  fail: false
                  format: markdown
                  jobSummary: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Create Issue From File
              if: steps.lychee.outputs.exit_code != 0
              uses: peter-evans/create-issue-from-file@v6
              with:
                  title: Link Checker Report - ${{ github.run_id }}
                  content-filepath: ./lychee/out.md
                  labels: |
                      Bot
