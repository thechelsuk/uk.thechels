---
name: Add Block Content

on:
    issues:
        types: [labeled, edited]

jobs:
    validation:
        runs-on: ubuntu-latest
        outputs:
            label: ${{ steps.match.outputs.label }}
        steps:
            - name: Match supported block label
              id: match
              uses: actions/github-script@v9
              with:
                  script: |
                      const supported = ['offers', 'podcasts'];
                      const labels = context.payload.issue.labels.map((label) => label.name);
                      const matched = supported.find((label) => labels.includes(label));
                      core.setOutput('label', matched || '');

    execution:
        if: needs.validation.outputs.label != ''
        needs: validation
        uses: ./.github/workflows/re-block-runner.yml
        with:
            content: ${{ github.event.issue.body }}
            label: ${{ needs.validation.outputs.label }}
