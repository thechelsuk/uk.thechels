name: Python Setup
description: Set up Python, configure pip cache, and install project dependencies.
inputs:
    python-version:
        description: Python version to install.
        required: false
        default: "3.13"

runs:
    using: composite
    steps:
        - name: Set up Python
          uses: actions/setup-python@v6
          with:
              python-version: ${{ inputs.python-version }}

        - name: Configure pip cache
          uses: actions/cache@v5
          with:
              path: ~/.cache/pip
              key: ${{ runner.os }}-pip-${{ hashFiles('_python/requirements.txt') }}
              restore-keys: |
                  ${{ runner.os }}-pip-

        - name: Install Python dependencies
          shell: bash
          run: python -m pip install -r "./_python/requirements.txt" --quiet
