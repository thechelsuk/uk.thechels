{% include header.html %}
<h1 class="post-title">{{ page.title }}</h1>
<p class="marker">
    <b>{{ site.data.podcasts | size }}</b> podcast subscriptions.
</p>
<p class="meta">
    Links are directly to the podcast feed.
</p>
{% assign sorted = site.data.podcasts | sort: 'name' %}
<ul>
    {% for item in sorted %}
    <li>// <a href="{{item.link}}">{{item.name}}</a> &neArr;</li>
    {% endfor %}
</ul>
{% include footer.html %}
