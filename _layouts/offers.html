{% include header.html %}
<h1 class="post-title">{{ page.title }}</h1>
<p class="marker"><b>{{ site.data.offers | size }}</b> Offers available.</p>

{{content}}

<ul id="offers">
    {% for item in site.data.offers %}
    <li><a rel="sponsored" href="{{item.link}}">{{item.title}}</a></li>
    {% endfor %}
</ul>
{% include footer.html %}
