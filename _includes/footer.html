</main>
</div>
<footer role="contentinfo" aria-label="Secondary" id="footer" class="flow">
  <ul class="footer-meta">
    <li>
      <a href="{{ site.url }}">{{ site.owner.name }}</a>
      &copy; {{ site.time | date: '%Y' }}
    </li>
    <li>Build: <a href="{{ site.github.repository_url }}">{{ site.github.build_revision | slice: 0, 10 }}</a></li>
    <li><a href="#top">↑ Back to top</a></li>
  </ul>

  <ul class="theme-icon-list">
    <li><span id="theme-cycle-icon">&#9682;</span></li>
  </ul>

  <ul class="footer-links">
    {% for item in site.navigation_footer %}
    <li><a href="{{item.link}}">{{item.title}}</a></li>
    {% endfor %}
    {% if page.layout == 'post' %}
    <li><a href="{{ site.url }}{{ page.url | remove:'index.html' | strip_slash }}.md">View as MD</a></li>
    {% endif %}
  </ul>
  <p class="footer-avatar">
    <a href="#top" id="theme-cycle" class="theme-toggle__link" aria-label="Activate to cycle visual themes"
      title="Activate to cycle visual themes"><img src="{{ site.owner.avatar }}"
        alt="{{ site.owner.name }} generated avatar on white background" class="footer-avatar"></a>
  </p>
</footer>
</div>
<script src="{{ site.baseurl }}/app.js"></script>
<script src="{{ site.baseurl }}/theme.js"></script>
</body>

</html>
