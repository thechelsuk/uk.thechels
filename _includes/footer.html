</main>
</div>
<footer role="contentinfo" id="footer" class="flow">
  <ul class="footer-meta">
    <li>Build: {{ site.github.build_revision | slice: 0, 12 }}.
      <span class="theme-icon theme-icon--light">&#9788;</span>
      <span class="theme-icon theme-icon--dark">&#9790;</span>
      <span class="theme-icon theme-icon--alt">&#9733;</span>
    </li>
    <li>&copy; {{ site.time | date: '%Y' }} {{ site.owner.name }}</li>
    <li><a href="#top">↑ Back to top</a></li>
  </ul>
  <ul class="footer-links">
    {% for item in site.navigation_footer %}
    <li><a href="{{item.link}}">{{item.title}}</a></li>
    {% endfor %}
    {% unless page.url == "/" %}
    <li><a href="{{ site.url }}{{ page.url | remove:'index.html' | strip_slash }}.md">Markdown</a></li>
    {% endunless %}
  </ul>
  <p class="footer-avatar">
    <img src="{{ site.owner.avatar }}" alt="{{ site.owner.name }}" class="footer-avatar">
  </p>
</footer>
</div>
<script src="{{ site.baseurl }}/app.js"></script>
</body>

</html>
