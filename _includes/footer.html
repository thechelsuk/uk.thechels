</div>
</div>
<div id="footer" class="flow">
  <p>&copy; {{ site.time | date: '%Y' }} {{ site.owner.name }} <img src="{{ site.owner.avatar }}"
      alt="{{ site.owner.name }}" width="12" height="12" class="footer-avatar"> | Last Build:
    {{ site.github.build_revision | slice: 0, 12 }} <a href=" #top" class="back-to-top" name="back-to-top">↑</a>
  </p>
  <p class="footer-links">
    {% unless page.url == "/" %}
    <a href="{{ site.url }}{{ page.url | remove:'index.html' | strip_slash }}.md">MD</a>
    {% endunless %}
    {% for item in site.navigation_footer %}
    <a href="{{item.link}}">{{item.title}}</a>
    {% endfor %}
  </p>
</div>
</div>
<script src="{{ site.baseurl }}/app.js"></script>
</body>

</html>
