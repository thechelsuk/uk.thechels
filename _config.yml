highlighter: rouge
permalink: ./:title
title: "Weak Notes"
description: "// A working in public, second brain"
version: 1.10.0
theme:
owner:
  name: thechelsuk
  email: "feedback@thechels.uk"
  uri: https://thechels.uk
  avatar: "/.well-known/avatar.png"
url: https://thechels.uk
encoding: UTF-8
future: false
github:
  repository_url: https://github.com/thechelsuk/uk.thechels
  branch: main
sass:
  style: compressed
webmentions:
  username: thechels.uk
  cache_folder: .cache
  cache_bad_uris_for: 5
  js: false
  throttle_lookups:
    last_week: daily
    last_month: weekly
    last_year: monthly
    older: monthly
  syndication:
    mastodon:
      endpoint: https://brid.gy/publish/mastodon
    bluesky:
      endpoint: https://brid.gy/publish/bluesky
    reddit:
      endpoint: https://brid.gy/publish/reddit
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      syndicate_to:
plugins:
  - jekyll-avatar
  - jekyll-github-metadata
  - jekyll-webmention_io
exclude:
  - CNAME
  - README.md
  - LICENSE.md
  - SECURITY.md
  - _python/
  - .github/
  - .sass-cache/
  - .jekyll-cache/
  - htmlcov/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - assets/
include:
  - ".well-known"
  - "_pages"

